# Example Nginx config for Sproutly (DigitalOcean droplet).
# Use with: domain michellastuhrbech.dk, frontend at /var/www/sproutly, backend on 127.0.0.1:7070.
#
# Important: the /api block must forward the Authorization header so login tokens
# reach the backend. Without it, every request returns 401 and users are sent back to login.

server {
    listen 80;
    server_name michellastuhrbech.dk;
    # Redirect HTTP to HTTPS if using Certbot:
    # return 301 https://$server_name$request_uri;
    root /var/www/sproutly;
    index index.html;

    # SPA: serve index.html for non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: proxy to backend and forward headers (required for JWT auth)
    location /api/ {
        proxy_pass http://127.0.0.1:7070/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required so the backend receives the JWT:
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }
}

