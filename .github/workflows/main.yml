name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build_frontend:
    name: Build frontend artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: Pack frontend artifact
        run: tar -czf frontend-dist.tar.gz -C frontend dist

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz
          retention-days: 3

  deploy:
    name: Deploy to server
    needs: build_frontend
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: .

      - name: Upload frontend artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT }}
          source: "frontend-dist.tar.gz"
          target: "/tmp"

      - name: Deploy backend and publish frontend
        uses: appleboy/ssh-action@v1.0.3
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT }}
          command_timeout: 90m
          envs: HEALTHCHECK_URL
          script: |
            set -euo pipefail

            APP_DIR="/root/backend/backend"
            FRONTEND_DIR="/var/www/sproutly"
            RELEASE_DIR="/tmp/sproutly-release-$(date +%s)"
            BACKUP_DIR="/tmp/sproutly-backup-$(date +%s)"
            HEALTH_URL="${HEALTHCHECK_URL:-http://127.0.0.1:7070/api/health}"
            HEALTH_URL_FALLBACK="http://127.0.0.1:7070/health"

            cd "$APP_DIR"
            git pull --ff-only origin main

            docker compose down --remove-orphans
            docker compose up -d --build --force-recreate db app

            mkdir -p "$RELEASE_DIR"
            tar -xzf /tmp/frontend-dist.tar.gz -C "$RELEASE_DIR"
            test -d "$RELEASE_DIR/dist"

            mkdir -p "$BACKUP_DIR"
            if [ -d "$FRONTEND_DIR" ] && [ "$(ls -A "$FRONTEND_DIR" 2>/dev/null)" ]; then
              cp -a "$FRONTEND_DIR"/. "$BACKUP_DIR"/
            fi

            rm -rf "$FRONTEND_DIR"/*
            cp -a "$RELEASE_DIR/dist"/. "$FRONTEND_DIR"/
            systemctl reload nginx

            ok=0
            for i in $(seq 1 24); do
              if curl --connect-timeout 2 -fsS "$HEALTH_URL" >/dev/null || curl --connect-timeout 2 -fsS "$HEALTH_URL_FALLBACK" >/dev/null; then
                ok=1
                break
              fi
              sleep 5
            done

            if [ "$ok" -ne 1 ]; then
              echo "Healthcheck failed at $HEALTH_URL - rolling back frontend."
              rm -rf "$FRONTEND_DIR"/*
              if [ -d "$BACKUP_DIR" ] && [ "$(ls -A "$BACKUP_DIR" 2>/dev/null)" ]; then
                cp -a "$BACKUP_DIR"/. "$FRONTEND_DIR"/
                systemctl reload nginx
              fi
              docker compose ps
              docker compose logs --tail=100
              exit 1
            fi

            rm -rf "$RELEASE_DIR" "$BACKUP_DIR"
            rm -f /tmp/frontend-dist.tar.gz
